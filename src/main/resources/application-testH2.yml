spring:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
  sql:
    init:
      continue-on-error: true
      mode: always
  datasource:
    url: jdbc:h2:mem:sgmc
    username: admin
    password: admin
  h2:
    console:
      enabled: true
      path: /h2-console
